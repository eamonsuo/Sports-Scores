        type: choice
        default: "all"
        options:
          - all
          - latest
      displayType:
        description: "Display type override e.g. round, date (single mode only)"
        required: false
        type: string

env:
  DATAVERSE_ENVIRONMENT_URL: ${{ secrets.DATAVERSE_ENVIRONMENT_URL }}
  DATAVERSE_TENANT_ID: ${{ secrets.DATAVERSE_TENANT_ID }}
  DATAVERSE_CLIENT_ID: ${{ secrets.DATAVERSE_CLIENT_ID }}
  DATAVERSE_CLIENT_SECRET: ${{ secrets.DATAVERSE_CLIENT_SECRET }}
  SOFASCORE_API_BASEURL: ${{ secrets.SOFASCORE_API_BASEURL }}
  RapidAPIKey: ${{ secrets.RAPIDAPIKEY }}
  NFL_BASEURL: ${{ secrets.NFL_BASEURL }}
  BASEBALL_BASEURL: ${{ secrets.BASEBALL_BASEURL }}
  BASKETBALL_BASEURL: ${{ secrets.BASKETBALL_BASEURL }}
  FOOTBALL_BASEURL: ${{ secrets.FOOTBALL_BASEURL }}
  ICE_HOCKEY_BASEURL: ${{ secrets.ICE_HOCKEY_BASEURL }}
  NRL_BASEURL: ${{ secrets.NRL_BASEURL }}
  TENNIS_BASEURL: ${{ secrets.TENNIS_BASEURL }}
  RUGBY_UNION_BASEURL: ${{ secrets.RUGBY_UNION_BASEURL }}
  MOTORSPORT_BASEURL: ${{ secrets.MOTORSPORT_BASEURL }}
  F1_BASEURL: ${{ secrets.F1_BASEURL }}
  OPENF1_BASEURL: ${{ secrets.OPENF1_BASEURL }}
  GOLF_BASEURL: ${{ secrets.GOLF_BASEURL }}

jobs:
  # ---- Read the committed matrix JSON ----
  read-matrix:
    if: ${{ github.event_name == 'schedule' || inputs.mode == 'allLeagues' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: echo "matrix=$(jq -c . sports-scores/scripts/eventUploadMatrix.json)" >> $GITHUB_OUTPUT

  # ---- Runs all configured matrix entries ----
  upload-matrix:
    needs: read-matrix
    runs-on: ubuntu-latest
    name: Upload — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.read-matrix.outputs.matrix) }}
    defaults:
      run:
        working-directory: sports-scores
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sports-scores/package-lock.json

      - run: npm ci

      - name: Run bulk upload - ${{ matrix.name }}
        run: |
          npx tsx scripts/bulk-upload-events.ts \
            "${{ matrix.leagueId }}" \
            "${{ matrix.seasonId }}" \
            "${{ matrix.sport }}" \
            "${{ matrix.displayType }}" \
            ${{ inputs.fetchMatches == 'all' && 'true' || 'false' }} \
            ${{ inputs.useSportApi }}

  # ---- Runs a single tournament (manual only) ----
  upload-single:
    if: ${{ inputs.mode == 'singleLeague' }}
    runs-on: ubuntu-latest
    name: Upload ${{ inputs.league }}
    defaults:
      run:
        working-directory: sports-scores
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sports-scores/package-lock.json

      - run: npm ci

      - name: Resolve league details
        id: resolve
        run: npx tsx scripts/resolve-league.ts "${{ inputs.league }}" "${{ inputs.seasonId }}"

      - name: Run bulk upload - ${{ inputs.league }}
        run: |
          npx tsx scripts/bulk-upload-events.ts \
            "${{ steps.resolve.outputs.leagueId }}" \
            "${{ steps.resolve.outputs.seasonId }}" \
            "${{ steps.resolve.outputs.sport }}" \
            "${{ inputs.displayType || steps.resolve.outputs.displayType }}" \
            ${{ inputs.fetchMatches == 'all' && 'true' || 'false' }} \
            ${{ inputs.useSportApi }}
